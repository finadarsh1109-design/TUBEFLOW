<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUBEFLOW AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* FORCING BLACK BACKGROUND TO FIX THE WHITE SCREEN */
        html, body {
            background-color: #050505 !important;
            color: #ffffff !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        .main-container {
            height: 100vh;
            width: 100vw;
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }

        /* 3D Floating Orb */
        .orb {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
            filter: blur(80px);
            opacity: 0.3;
            transform: translate(-50%, -50%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="orb"></div>

    <div id="wrapper" class="main-container">
        
        <!-- PAGE 1: SURFACE -->
        <section>
            <h1 class="text-5xl font-black mb-4 tracking-tighter">TUBEFLOW</h1>
            <p class="text-blue-400 font-bold mb-10 uppercase tracking-widest text-sm">WHAT CAN I DO FOR YOU?</p>
            
            <div class="glass-box">
                <input type="text" id="prompt" placeholder="Describe your video niche..." 
                    class="w-full bg-black/50 border border-white/20 p-4 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none mb-4">
                <button onclick="move(1)" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black transition-all">GENERATE DEMO</button>
            </div>
        </section>

        <!-- PAGE 2: DEMO -->
        <section class="bg-zinc-900">
            <h2 class="text-3xl font-bold mb-6">AI MODEL PREVIEW</h2>
            <div class="glass-box aspect-video flex items-center justify-center border-2 border-dashed border-blue-500/50 mb-6">
                <p class="text-blue-400 animate-pulse">GENERATING 3D ASSETS...</p>
            </div>
            <button onclick="move(2)" class="px-10 py-4 bg-white text-black font-bold rounded-full">UPGRADE TO EXPORT</button>
        </section>

        <!-- PAGE 3: SALES -->
        <section>
            <h2 class="text-4xl font-black mb-10 text-blue-500">PRICING COMPARISON</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl">
                <div class="p-6 bg-white/5 rounded-2xl border border-white/10 text-left opacity-50">
                    <p class="text-xs uppercase">Market Price</p>
                    <p class="text-3xl font-bold line-through">$250/video</p>
                </div>
                <div class="p-6 bg-blue-600 rounded-2xl text-left shadow-2xl">
                    <p class="text-xs uppercase">TubeFlow Price</p>
                    <p class="text-4xl font-black">$19/month</p>
                    <button class="mt-4 w-full bg-black text-white py-2 rounded-lg">JOIN NOW</button>
                </div>
            </div>
            <button onclick="move(0)" class="mt-10 text-gray-500 text-xs underline">RESTART PROCESS</button>
        </section>

    </div>

    <script>
        function move(index) {
            const wrapper = document.getElementById('wrapper');
            wrapper.style.transform = `translateY(-${index * 100}vh)`;
        }
    </script>
</body>
</html>
